<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .parrafos{
            color: red;
        }
    </style>
</head>
<body>
    
    <h1 id="titulo">Hola Mundo</h1>
    <h1 id="titulo2">Nuevo titulo</h1>
    <p id="parrafo" class="parrafos">HiBro</p>
    <p id="parrafo2" class="parrafos">HiBro2</p>
    <p id="parrafo3" class="parrafos">HiBro3</p>

    <!-- Script JS-->
    <script>
        let parrafos = document.querySelectorAll("p.parrafos"); // Devuelve una colección de elementos con la combinacion dada
        let titulos = document.querySelectorAll("h1");
        let titulos2 = document.querySelectorAll("h1#titulo2");
        console.log(parrafos); 
        console.log(titulos);
        console.log(titulos2);
        
        // for of para titulos
        for (let valor of titulos){
            console.log(valor.innerHTML);
        }

        // for of para titulos2
        for (let valor of titulos2){
            console.log(valor.innerHTML);
        }

        // for of para parrafos
        for (let valor of parrafos){
            console.log(valor.innerHTML);
        }
    </script>

</body>
</html>
