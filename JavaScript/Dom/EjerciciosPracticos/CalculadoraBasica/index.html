<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Calculadora Basica</title>

    <!-- Link bootstrap estilos -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- Link css personal -->
     <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <h1>Calculadora Básica</h1>

    <form id="formulario">
        <div class="mb-3">
            <label for="exampleInputEmail1" class="form-label">Numero 1</label>
            <input type="text" class="form-control" id="numero1" aria-describedby="emailHelp">
        </div>
        
        <div class="mb-3">
            <label for="exampleInputPassword1" class="form-label">Numero 2</label>
            <input type="text" class="form-control" id="numero2">
        </div>
        
    </form>
        <button  class="btn btn-primary" id="boton-resultado">SUMAR</button>

    <div>
        <span id="resultado"></span>
    </div>

    <!-- Link bootstrap js -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <!-- Script personal de funcionalidad -->
     <script src="./script.js"></script>
  </body>
</html>
