<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Aplicacion a formularios -->
    <h1 id="titulo">titulo</h1>
    <button onclick="mostrar()" >Clik Me</button>
    <br />

    <!-- Script JS-->
    <script>
        function mostrar(){
            document.getElementById('titulo').style.color = 'red'; // Se cambian las propiedades css con el evento de click
        }
    </script>

</body>
</html>
