<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body id="body">
    <!-- Eventos -->
    <!-- onFocus: cuando se realiza cick sobre el componente, enfocandose en el -->
    <!-- onBlur: al salir del foco del componente, se inhabilita el evento onfocus-->
    <h1 id="titulo">Formulario</h1>

    <input type="text" name="nombre" id="name" onfocus="cambiar()" onblur="regresar()">

    <!-- Script JS-->
    <script>
        function cambiar(){
            let name = document.getElementById("name");
            name.style.background="red";
        }

        function regresar(){
            let name = document.getElementById("name");
            name.style.background="white";
        }
    </script>

</body>
</html>
